services:
  redis:
    image: redis:7-alpine
    container_name: mcp-dlt-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  
  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.api
    container_name: mcp-dlt-api
    depends_on:
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.worker
    container_name: mcp-dlt-worker
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.infrastructure.messaging.celery_app worker -Q transform_dates -l info -P solo
    restart: unless-stopped

  frontend:
    build:
      context: mcp-transform-ui
      dockerfile: Dockerfile
    container_name: mcp-transform-ui
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped
